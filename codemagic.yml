workflows:
  ios-appstore-release:
    name: iOS App Store Release
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic-appstore
    environment:
      ios_signing:
        certificates:
          - certificate: ios_dist_esnaftaucuz_2026
            environment_variable: CM_CERT_PATH
        provisioning_profiles:
          - profile: esnaftaucuz_appstore_correct
            environment_variable: CM_PROFILE_PATH
      groups:
        - supabase_env
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.esnaftaucuz.app"
      node: "20"
      xcode: "latest"
      cocoapods: "default"
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ] || [ -z "$VITE_GOOGLE_MAPS_API_KEY" ]; then
            echo "Missing VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, or VITE_GOOGLE_MAPS_API_KEY"
            exit 1
          fi
          cat > .env <<EOF
          VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY
          VITE_GOOGLE_MAPS_API_KEY=$VITE_GOOGLE_MAPS_API_KEY
          EOF
          npm run build
          if [ ! -f "dist/index.html" ]; then
            echo "dist/index.html missing after npm run build; retrying with npx vite build..."
            npx vite build --outDir dist
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "Build failed: dist/index.html was not generated."
            exit 1
          fi
          rm -f .env
      - name: Ensure iOS platform exists
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Configure Firebase native files
        script: |
          if [ -n "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64" ]; then
            mkdir -p android/app
            echo "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json
          fi

          if [ -z "$FIREBASE_IOS_GOOGLESERVICE_INFO_PLIST_B64" ]; then
            echo "Missing FIREBASE_IOS_GOOGLESERVICE_INFO_PLIST_B64"
            exit 1
          fi
          mkdir -p ios/App/App
          echo "$FIREBASE_IOS_GOOGLESERVICE_INFO_PLIST_B64" | base64 --decode > ios/App/App/GoogleService-Info.plist
          # Some Xcode project setups reference the plist under ios/App/.
          echo "$FIREBASE_IOS_GOOGLESERVICE_INFO_PLIST_B64" | base64 --decode > ios/App/GoogleService-Info.plist
      - name: Sync Capacitor iOS
        script: |
          if [ ! -f "dist/index.html" ]; then
            echo "dist/index.html missing before sync; running npm run build..."
            npm run build
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "Cannot sync iOS: dist/index.html still missing."
            exit 1
          fi
          npx cap sync ios
      - name: Set iOS privacy usage descriptions
        script: |
          PLIST_PATH="ios/App/App/Info.plist"
          if [ ! -f "$PLIST_PATH" ]; then
            echo "Info.plist not found at $PLIST_PATH"
            exit 1
          fi

          set_or_add_plist_string() {
            local key="$1"
            local value="$2"
            /usr/libexec/PlistBuddy -c "Set :$key '$value'" "$PLIST_PATH" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :$key string '$value'" "$PLIST_PATH"
          }
          set_or_add_plist_bool() {
            local key="$1"
            local value="$2"
            /usr/libexec/PlistBuddy -c "Set :$key $value" "$PLIST_PATH" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :$key bool $value" "$PLIST_PATH"
          }

          set_or_add_plist_string "NSCameraUsageDescription" "esnaftaucuz needs camera access to take product and price photos."
          set_or_add_plist_string "NSPhotoLibraryUsageDescription" "esnaftaucuz needs photo library access so you can select product images."
          set_or_add_plist_string "NSPhotoLibraryAddUsageDescription" "esnaftaucuz needs photo library write access to save captured images when requested."
          set_or_add_plist_string "NSLocationWhenInUseUsageDescription" "esnaftaucuz needs your location while using the app to show nearby prices."
          set_or_add_plist_bool "ITSAppUsesNonExemptEncryption" "false"

          # Ensure custom URL scheme exists for OAuth deep-link callback.
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" "$PLIST_PATH" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string $BUNDLE_ID" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string com.esnaftaucuz.app" "$PLIST_PATH"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..
      - name: Apply provisioning profiles to Xcode project
        script: |
          if [ -z "$CM_PROFILE_PATH" ] || [ ! -f "$CM_PROFILE_PATH" ]; then
            echo "Provisioning profile path is missing or invalid: $CM_PROFILE_PATH"
            exit 1
          fi
          xcode-project use-profiles --project "$XCODE_PROJECT" --profile "$CM_PROFILE_PATH" --archive-method app-store
      - name: Build signed IPA
        script: |
          IOS_BUILD_NUMBER=$(date +%s)
          echo "Using iOS build number: $IOS_BUILD_NUMBER"
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME" --archive-xcargs "CURRENT_PROJECT_VERSION=$IOS_BUILD_NUMBER"
      - name: Upload IPA to App Store Connect
        script: |
          app-store-connect publish --path "build/ios/ipa/*.ipa" --apple-id 6760316835 --max-find-build-wait 1 --max-build-processing-wait 1
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - sbabadag@gmail.com
        notify:
          success: true
          failure: true

