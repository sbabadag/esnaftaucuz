workflows:
  ios-appstore-release:
    name: iOS App Store Release
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic-appstore
    environment:
      ios_signing:
        certificates:
          - certificate: ios_dist_esnaftaucuz_2026
            environment_variable: CM_CERT_PATH
        provisioning_profiles:
          - profile: esnaftaucuz_appstore_correct
            environment_variable: CM_PROFILE_PATH
      groups:
        - supabase_env
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.esnaftaucuz.app"
      node: "20"
      xcode: "latest"
      cocoapods: "default"
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
          cat > .env <<EOF
          VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY
          EOF
          npm run build
          rm -f .env
      - name: Ensure iOS platform exists
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..
      - name: Apply provisioning profiles to Xcode project
        script: |
          if [ -z "$CM_PROFILE_PATH" ] || [ ! -f "$CM_PROFILE_PATH" ]; then
            echo "Provisioning profile path is missing or invalid: $CM_PROFILE_PATH"
            exit 1
          fi
          xcode-project use-profiles --project "$XCODE_PROJECT" --profile "$CM_PROFILE_PATH" --archive-method app-store
      - name: Build signed IPA
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
      - name: Upload IPA to App Store Connect
        script: |
          app-store-connect publish --path "build/ios/ipa/*.ipa" --max-find-build-wait 1 --max-build-processing-wait 1
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - sbabadag@gmail.com
        notify:
          success: true
          failure: true

