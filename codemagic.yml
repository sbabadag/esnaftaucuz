workflows:
  ios-appstore-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic-appstore
    environment:
      ios_signing:
        certificates:
          - certificate: ios_dist_esnaftaucuz_2026
            environment_variable: CM_CERT_PATH
        provisioning_profiles:
          - profile: esnaftaucuz_appstore_correct
            environment_variable: CM_PROFILE_PATH
      groups:
        - supabase_env
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.esnaftaucuz.app"
      node: "20"
      xcode: "latest"
      cocoapods: "default"
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
          cat > .env <<EOF
          VITE_SUPABASE_URL=$VITE_SUPABASE_URL
          VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY
          EOF
          npm run build
          rm -f .env
      - name: Ensure iOS platform exists
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..
      - name: Apply provisioning profiles to Xcode project
        script: |
          if [ -z "$CM_PROFILE_PATH" ] || [ ! -f "$CM_PROFILE_PATH" ]; then
            echo "Provisioning profile path is missing or invalid: $CM_PROFILE_PATH"
            exit 1
          fi
          security cms -D -i "$CM_PROFILE_PATH" > /tmp/cm_profile.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/cm_profile.plist)
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/cm_profile.plist)
          if [[ "$PROFILE_APP_ID" != *".${BUNDLE_ID}" ]]; then
            echo "Provisioning profile bundle mismatch. Expected suffix: .$BUNDLE_ID, got: $PROFILE_APP_ID"
            exit 1
          fi
          echo "Using provisioning profile: $PROFILE_NAME ($PROFILE_APP_ID)"
          echo "CM_PROFILE_NAME=$PROFILE_NAME" >> "$CM_ENV"
          xcode-project use-profiles --project "$XCODE_PROJECT" --profile "$CM_PROFILE_PATH" --archive-method app-store --code-signing-setup-verbose-logging
      - name: Build signed IPA
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME" --disable-xcpretty --archive-flags "-verbose" --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER=\"$CM_PROFILE_NAME\""
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
      email:
        recipients:
          - sbabadag@gmail.com
        notify:
          success: true
          failure: true

